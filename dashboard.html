<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EduPlatform</title>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#4F46E5', darkbg: '#111827', darkcard: '#1F2937' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkbg dark:text-gray-100 transition-colors duration-300 flex flex-col min-h-screen">
    <div id="navbar-container"></div>
    <main id="dashboard-page" class="flex-grow pt-24 pb-16 px-6 max-w-7xl mx-auto w-full slide-up">
        <h1 class="text-3xl font-bold mb-8">My Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white dark:bg-darkcard p-6 rounded-xl shadow-md">
                <p class="text-gray-500">Enrolled Courses</p><h3 id="stat-enrolled" class="text-2xl font-bold">0</h3>
            </div>
            <div class="bg-white dark:bg-darkcard p-6 rounded-xl shadow-md">
                <p class="text-gray-500">Completed Lessons</p><h3 id="stat-completed" class="text-2xl font-bold">0</h3>
            </div>
            <div class="bg-white dark:bg-darkcard p-6 rounded-xl shadow-md">
                <p class="text-gray-500">Last Activity</p><h3 id="stat-last" class="text-lg font-bold truncate">None</h3>
            </div>
        </div>
        <h2 class="text-2xl font-bold mb-6">Continue Learning</h2>
        <div id="dashboard-courses" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>
    <div id="footer-container"></div>
    <script src="app.js"></script>
</body>
</html>
